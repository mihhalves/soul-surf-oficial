<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ✏️ MUDE: título da aba -->
  <title>TÍTULO DO ARTIGO · Soul Surf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Glegoo:wght@400;700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body { font-family: 'Poppins', sans-serif; color: #333; background: #fff; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }
    h1, h2, h3 { font-family: 'Glegoo', serif; }
    .art-header { background: #0a1628; padding: max(16px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) 16px max(24px, env(safe-area-inset-left)); display: flex; align-items: center; gap: 16px; }
    .art-header a { color: rgba(255,255,255,.65); font-size: 14px; font-weight: 500; transition: color .2s; }
    .art-header a:hover { color: #fff; }
    .art-header-brand { color: #fff; font-weight: 700; font-size: 16px; margin-left: auto; }
    .art-header-sep { color: rgba(255,255,255,.2); }
    .art-hero { width: 100%; height: 420px; object-fit: cover; display: block; }
    .art-body { max-width: 760px; margin: 0 auto; padding: 56px max(24px, env(safe-area-inset-right)) calc(96px + env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left)); }
    .art-meta { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #0073A8; margin-bottom: 18px; }
    .art-title { font-size: clamp(28px, 5vw, 48px); line-height: 1.2; color: #0a1628; margin-bottom: 28px; }
    .art-body p { font-size: 17px; line-height: 1.88; color: #555; margin-bottom: 24px; }
    .art-body h2 { font-size: 26px; color: #0a1628; margin: 40px 0 16px; }
    .art-body img { width: 100%; border-radius: 16px; margin: 36px 0; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    .art-body blockquote { border-left: 4px solid #0073A8; margin: 32px 0; padding: 16px 24px; background: #f0f7ff; border-radius: 0 12px 12px 0; font-style: italic; color: #444; font-size: 17px; line-height: 1.72; }
    .art-body ul { padding-left: 24px; margin-bottom: 24px; }
    .art-body li { font-size: 16px; line-height: 1.8; color: #555; margin-bottom: 8px; }
    .art-back { display: inline-flex; align-items: center; gap: 8px; margin-top: 56px; padding: 14px 28px; border-radius: 50px; background: #0073A8; color: #fff; font-weight: 700; font-size: 15px; transition: background .25s; }
    .art-back:hover { background: #005a84; }
    @media (max-width: 600px) {
      .art-header { flex-wrap: wrap; row-gap: 10px; }
      .art-header-sep { display: none; }
      .art-header-brand { width: 100%; margin-left: 0; font-size: 15px; }
      .art-hero { height: 240px; }
      .art-body { padding-top: 40px; }
      .art-body p, .art-body blockquote, .art-body li { font-size: 16px; line-height: 1.75; }
      .art-back { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <header class="art-header">
    <a href="../index.html">← Voltar ao site</a>
    <span class="art-header-sep">|</span>
    <a href="../index.html#blog">Blog</a>
    <span class="art-header-brand">Soul Surf</span>
  </header>

  <!-- ✏️ FOTO: coloque a foto na pasta site/fotos/ e ajuste o src -->
  <img class="art-hero"
      src="../fotos/NOME-DA-FOTO.JPG"
       alt="Descrição da foto para acessibilidade" />

  <article class="art-body">

    <!-- ✏️ DATA E CATEGORIA: ex: 28 Mar 2026 · Evento -->
    <span class="art-meta">DD Mês AAAA · Categoria</span>

    <!-- ✏️ TÍTULO -->
    <h1 class="art-title">Título do Artigo</h1>

    <!-- ✏️ PARÁGRAFOS: escreva o conteúdo aqui -->
    <p>
      Primeiro parágrafo do artigo. Escreva o texto aqui.
    </p>

    <p>
      Segundo parágrafo. Continue escrevendo aqui.
    </p>

    <!-- Subtítulo de seção -->
    <h2>Subtítulo da Seção</h2>

    <p>
      Texto da seção.
    </p>

    <!-- Foto dentro do artigo (opcional) -->
    <!-- <img src="../fotos/OUTRA-FOTO.JPG" alt="Legenda da foto" /> -->

    <!-- Citação em destaque (opcional) -->
    <!-- <blockquote>Texto em destaque ou depoimento.</blockquote> -->

    <!-- Lista (opcional) -->
    <!-- <ul>
      <li>Item 1</li>
      <li>Item 2</li>
    </ul> -->

    <a class="art-back" href="../index.html#blog">← Voltar para o Blog</a>

  </article>

</body>
</html>
